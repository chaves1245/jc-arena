<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JC Arena</title>

<style>

body{
margin:0;
background:#111;
font-family:Arial;
color:white;
}

header{
background:#d4af37;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:black;
}

.container{
padding:20px;
}

.card{
background:#222;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
background:#d4af37;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<header>
🏆 JC Arena
</header>

<div class="container">

<div class="card">

<h2>Bem-vindo!</h2>

<p id="usuario"></p>

</div>

<div class="card">

<h3>⚽ Jogo do Dia</h3>

<p>Flamengo 🆚 Palmeiras</p>

<button onclick="window.location.href='palpite.html'">
🎯 Dar Palpite
</button>
</div>

<button id="btnSair">
🚪 Sair
</button>

</div>

<script type="module">

import { auth } from "./firebase.js";

import {
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("usuario").innerHTML=
"📧 "+user.email;

}else{

window.location.href="index.html";

}

});

document.getElementById("btnSair").addEventListener("click",async()=>{

await signOut(auth);

window.location.href="index.html";

});

</script>

</body>
</html>
