<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JC Arena - Painel</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
}

header{
background:#d4af37;
color:#111;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.card{
background:#222;
margin:20px;
padding:20px;
border-radius:15px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
background:#d4af37;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
}
</style>

</head>

<body>

<header>
🏆 JC Arena
</header>

<div class="card">
<h2>Bem-vindo!</h2>

</div>

<div class="card">
<button>⚽ Jogos de Hoje</button>
<button>🎯 Fazer Palpite</button>
<button>🏆 Ranking</button>
<button>👤 Meu Perfil</button>
<button id="btnSair">🚪 Sair</button>
</div><script type="module">

import { auth } from "./firebase.js";

import { signOut } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

document.getElementById("btnSair").addEventListener("click", async ()=>{

    await signOut(auth);

    window.location.href="index.html";

});

</script>

</body>

</script>
</html>
