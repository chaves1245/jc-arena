<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dar Palpite</title>

<style>

body{

background:#111;

font-family:Arial;

color:white;

margin:0;

}

header{

background:#d4af37;

padding:20px;

text-align:center;

font-size:30px;

font-weight:bold;

color:black;

}

.container{

padding:20px;

}

.card{

background:#222;

padding:20px;

border-radius:15px;

}

button{

width:100%;

padding:16px;

margin-top:15px;

font-size:20px;

background:#d4af37;

border:none;

border-radius:10px;

font-weight:bold;

cursor:pointer;

}

</style>

</head>

<body>

<header>

🏆 Dar Palpite

</button>

</header>

<div class="container">

<div class="card">

<h2>Flamengo 🆚 Palmeiras</h2>

<p>Quem vence?</p>

<<button id="flamengo">🔴 Flamengo</button>

<button id="empate">⚪ Empate</button>

<button id="palmeiras">🟢 Palmeiras</button>

<p id="resultado"></p>
<br><br>

<button onclick="window.location.href='dashboard.html'">

⬅️ Voltar

</button>

</div>

</div>
<script type="module">

import { db, auth } from "./firebase.js";

import {
collection,
addDoc,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";
async function carregarPalpite(){

const q = query(
collection(db,"palpites"),
where("email","==",auth.currentUser.email)
);

const resultado = await getDocs(q);

if(!resultado.empty){

const ultimo = resultado.docs[resultado.docs.length-1].data();

document.getElementById("resultado").innerHTML =
"🏆 Seu último palpite: " + ultimo.palpite;

}

}
function votar(time){

addDoc(collection(db,"palpites"),{

email: auth.currentUser.email,

palpite: time,

data: new Date()

});

document.getElementById("resultado").innerHTML=
"✅ Palpite salvo: " + time;

}

document.getElementById("flamengo")
.addEventListener("click",()=>votar("Flamengo"));

document.getElementById("empate")
.addEventListener("click",()=>votar("Empate"));

document.getElementById("palmeiras")
.addEventListener("click",()=>votar("Palmeiras"));
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

onAuthStateChanged(auth, (user) => {
    if(user){
        carregarPalpite();
    }
});
</script>
</body>

</html>
